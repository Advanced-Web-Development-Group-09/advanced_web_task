<mat-drawer-container class="h-screen" autosize>
  <mat-drawer mode="side" opened>
    <app-sidenav></app-sidenav>
  </mat-drawer>
  <mat-drawer-content>
    <mat-card appearance="outlined">
      <mat-card-content>
        <div class="flex flex-row gap-16 justify-center items-end">
          <div class="flex flex-col gap-3 items-center w-fit">
            <div class="flex flex-col items-center w-fit">
              <div
                class="flex items-center justify-center rounded-full bg-[#D9D9D9] text-3xl w-14 h-14"
              >
                D
              </div>
              <div class="flex flex-col w-fit items-center">
                <p class="text-xl font-medium w-fit">Danny Noppert</p>
                <p class="w-fit">70 Points</p>
              </div>
            </div>
            <div
              class="flex items-center justify-center rounded-2xl bg-[#D9D9D9] text-5xl w-40 h-52"
            >
              2
            </div>
          </div>
          <div class="flex flex-col gap-3 items-center w-fit">
            <div class="flex flex-col items-center w-fit">
              <div
                class="flex items-center justify-center rounded-full bg-[#D9D9D9] text-3xl w-14 h-14"
              >
                N
              </div>
              <div class="flex flex-col w-fit items-center">
                <p class="text-xl font-medium w-fit">NormalErik</p>
                <p class="w-fit">100 Points</p>
              </div>
            </div>
            <div
              class="flex items-center justify-center rounded-2xl bg-[#D9D9D9] text-5xl w-40 h-72"
            >
              1
            </div>
          </div>
          <div class="flex flex-col gap-3 items-center w-fit">
            <div class="flex flex-col items-center w-fit">
              <div
                class="flex items-center justify-center rounded-full bg-[#D9D9D9] text-3xl w-14 h-14"
              >
                S
              </div>
              <div class="flex flex-col w-fit items-center">
                <p class="text-xl font-medium w-fit">Stephen Bunting</p>
                <p class="w-fit">30 Points</p>
              </div>
            </div>
            <div
              class="flex items-center justify-center rounded-2xl bg-[#D9D9D9] text-5xl w-40 h-40"
            >
              3
            </div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
    <mat-card appearance="outlined">
      <mat-card-content>
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
          <ng-container matColumnDef="place">
            <th mat-header-cell *matHeaderCellDef>Place</th>
            <td mat-cell *matCellDef="let element">{{ element.place }}</td>
          </ng-container>

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let element">{{ element.name }}</td>
          </ng-container>

          <ng-container matColumnDef="points">
            <th mat-header-cell *matHeaderCellDef>Points</th>
            <td mat-cell *matCellDef="let element">{{ element.points }}</td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </mat-card-content>
    </mat-card>
  </mat-drawer-content>
</mat-drawer-container>
