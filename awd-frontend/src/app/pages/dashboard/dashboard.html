<mat-drawer-container autosize>
  <mat-drawer mode="side" opened>
    <app-sidenav></app-sidenav>
  </mat-drawer>
  <mat-drawer-content>
    <mat-card appearance="outlined">
      <mat-card-content>
        <div class="flex flex-row gap-4">
          <form class="example-form">
            <mat-form-field>
              <mat-label>Search</mat-label>
              <span matTextPrefix>
                <mat-icon>search</mat-icon>
              </span>
              <input matInput (keyup)="applyFilter($event)" #input />
              <mat-icon matSuffix>mode_edit</mat-icon>
            </mat-form-field>
          </form>
          <!--
          <mat-form-field>
            <mat-label>Choose a date</mat-label>
            <input matInput [matDatepicker]="picker" />
            <mat-hint>MM/DD/YYYY</mat-hint>
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>
          -->
          <button matFab extended>
            <mat-icon>download</mat-icon>
            Export
          </button>
        </div>
        <table mat-table [dataSource]="dataSource" matSort multiTemplateDataRows>
          <!-- Checkbox Column -->
          <ng-container matColumnDef="select">
            <th mat-header-cell *matHeaderCellDef>
              <mat-checkbox
                (change)="$event ? toggleAllRows() : null"
                [checked]="selection.hasValue() && isAllSelected()"
                [indeterminate]="selection.hasValue() && !isAllSelected()"
                [aria-label]="checkboxLabel()"
              >
              </mat-checkbox>
            </th>
            <td mat-cell *matCellDef="let row">
              <mat-checkbox
                (click)="$event.stopPropagation()"
                (change)="$event ? selection.toggle(row) : null"
                [checked]="selection.isSelected(row)"
                [aria-label]="checkboxLabel(row)"
              >
              </mat-checkbox>
            </td>
          </ng-container>

          <!-- Expand Column -->
          <ng-container matColumnDef="expand">
            <th mat-header-cell *matHeaderCellDef aria-label="row actions">&nbsp;</th>
            <td mat-cell *matCellDef="let element">
              <button
                matIconButton
                aria-label="expand row"
                (click)="toggle(element); $event.stopPropagation()"
                class="example-toggle-button"
                [class.example-toggle-button-expanded]="isExpanded(element)"
              >
                <mat-icon>keyboard_arrow_down</mat-icon>
              </button>
            </td>
          </ng-container>

          <!-- ID Column -->
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
            <td mat-cell *matCellDef="let row">{{ row.id }}</td>
          </ng-container>

          <!-- Progress Column -->
          <ng-container matColumnDef="station">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Station</th>
            <td mat-cell *matCellDef="let row">{{ row.station }}</td>
          </ng-container>

          <!-- Name Column -->
          <ng-container matColumnDef="plannedDeparture">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Planned Departure</th>
            <td mat-cell *matCellDef="let row">{{ row.plannedDeparture }}</td>
          </ng-container>

          <!-- Expanded Content Column -->
          <ng-container matColumnDef="expandedDetail">
            <td
              mat-cell
              *matCellDef="let element"
              [attr.colspan]="columnsToDisplayWithExpand.length"
            >
              <div
                class="example-element-detail-wrapper"
                [class.example-element-detail-wrapper-expanded]="isExpanded(element)"
              >
                <div class="example-element-detail">
                  <div class="p-1 pl-20">
                    <div>ID: {{ element.id }}</div>
                    <div>Station: {{ element.station }}</div>
                    <div>Planned Departure: {{ element.plannedDeparture }}</div>
                  </div>
                </div>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="columnsToDisplayWithExpand"></tr>
          <tr
            mat-row
            *matRowDef="let element; columns: columnsToDisplayWithExpand"
            class="example-element-row"
            [class.example-expanded-row]="isExpanded(element)"
            (click)="toggle(element)"
          ></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: ['expandedDetail']"
            class="example-detail-row"
          ></tr>

          <!-- Row shown when there is no matching data. -->
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" colspan="4">No data matching the filter "{{ input.value }}"</td>
          </tr>
        </table>
        <mat-paginator [pageSizeOptions]="[10, 25, 100]"></mat-paginator>
      </mat-card-content>
    </mat-card>
  </mat-drawer-content>
</mat-drawer-container>
